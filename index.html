<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ephemeral Note</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 3rem;
      font-size: 2rem;
      line-height: 1.5;
      background: white;
      color: black;
      outline: none;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body {
        background: #111;
        color: #eee;
      }
      .placeholder {
        color: #666;
      }
    }

    .placeholder {
      opacity: 0.4;
      pointer-events: none;
    }
  </style>
</head>

<body contenteditable="true" spellcheck="false">
  <div id="placeholder" class="placeholder">
    Start typing… (nothing is saved)
  </div>

  <script>
    const body = document.body;
    const placeholder = document.getElementById("placeholder");

    let inactivityTimer;
    const INACTIVITY_LIMIT = 10 * 60 * 1000; // 10 minutes

    function resetTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        wipeAll();
      }, INACTIVITY_LIMIT);
    }

    // ✅ Recommended practical "destroy DOM"
    function wipeAll() {
      document.open();
      document.write(`
        <!DOCTYPE html>
        <html>
          <head>
            <title>Ephemeral Note</title>
          </head>
          <body style="background:black;"></body>
        </html>
      `);
      document.close();
    }

    // Remove placeholder when typing starts
    body.addEventListener("input", () => {
      if (body.innerText.trim().length > 0) {
        if (placeholder) placeholder.remove();
      }
      resetTimer();
    });

    // Track general activity
    ["keydown", "mousedown", "mousemove", "touchstart"].forEach(event => {
      window.addEventListener(event, resetTimer);
    });

    // Panic wipe (Ctrl + K)
    window.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.key.toLowerCase() === "k") {
        e.preventDefault();
        wipeAll();
      }
    });

    // Safety wipe on exit
    window.addEventListener("beforeunload", () => {
      wipeAll();
    });

    // Prevent drag/drop
    window.addEventListener("drop", (e) => e.preventDefault());
    window.addEventListener("dragover", (e) => e.preventDefault());

    // Start timer
    resetTimer();
  </script>
</body>
</html>
