<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ephemeral Note</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      padding: 3rem;
      font-size: 2rem;
      line-height: 1.5;
      background: white;
      color: black;
      transition: background 0.2s, color 0.2s;
    }

    /* Dark mode */
    body.dark {
      background: #111;
      color: #eee;
    }

    /* Editor */
    #editor {
      min-height: 80vh;
      outline: none;
    }

    /* Placeholder */
    #placeholder {
      position: absolute;
      top: 3rem;
      left: 3rem;
      color: #999;
      pointer-events: none;
    }

    /* Light gray in dark mode */
    body.dark #placeholder {
      color: #bbb;
    }

    /* Buttons (touch-friendly) */
    button {
      position: fixed;
      top: 1rem;
      padding: 0.6rem 1rem;
      font-size: 1.3rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      opacity: 0.75;
    }

    button:hover {
      opacity: 1;
    }

    #toggle {
      right: 1rem;
    }

    #wipe {
      right: 5rem;
    }
  </style>
</head>

<body>
  <!-- Buttons -->
  <button id="wipe">🧹</button>
  <button id="toggle">🌙</button>

  <!-- Editor -->
  <div id="editor" contenteditable="true" spellcheck="false"></div>
  <div id="placeholder">Start typing… (nothing is saved)</div>

  <script>
    const editor = document.getElementById("editor");
    const placeholder = document.getElementById("placeholder");
