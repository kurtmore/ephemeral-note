<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ephemeral Note</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 3rem;
      font-size: 2rem;
      line-height: 1.5;
      background: white;
      color: black;
      outline: none;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body {
        background: #111;
        color: #eee;
      }
      .placeholder {
        color: #666;
      }
    }

    .placeholder {
      opacity: 0.4;
      pointer-events: none;
    }
  </style>
</head>

<body contenteditable="true" spellcheck="false">
  <div id="placeholder" class="placeholder">
    Start typing… (nothing is saved)
  </div>

  <script>
    const body = document.body;
    const placeholder = document.getElementById("placeholder");

    let inactivityTimer;
    const INACTIVITY_LIMIT = 10 * 60 * 1000; // 10 minutes

    function resetTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        wipeAll();
      }, INACTIVITY_LIMIT);
    }

    function wipeAll() {
      body.innerHTML = "";
    }
