<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ephemeral Note</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      padding: 3rem;
      font-size: 2rem;
      line-height: 1.5;
      background: white;
      color: black;
      transition: background 0.2s, color 0.2s;
    }

    body.dark {
      background: #111;
      color: #eee;
    }

    #editor {
      min-height: 80vh;
      outline: none;
    }

    #placeholder {
      position: absolute;
      top: 3rem;
      left: 3rem;
      color: #999;
      pointer-events: none;
    }

    body.dark #placeholder {
      color: #bbb;
    }

    button {
      position: fixed;
      top: 1rem;
      padding: 0.6rem 1rem;
      font-size: 1.3rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      opacity: 0.75;
    }

    button:hover {
      opacity: 1;
    }

    #toggle { right: 1rem; }
    #wipe { right: 5rem; }
  </style>
</head>

<body>
  <button id="wipe">🧹</button>
  <button id="toggle">🌙</button>

  <div id="editor" contenteditable="true" spellcheck="false"></div>
  <div id="placeholder">Start typing… (nothing is saved)</div>

  <script>
    const editor = document.getElementById("editor");
    const placeholder = document.getElementById("placeholder");
    const toggleBtn = document.getElementById("toggle");
    const wipeBtn = document.getElementById("wipe");

    let inactivityTimer;
    const INACTIVITY_LIMIT = 10 * 60 * 1000;

    /* ✅ System dark mode */
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.body.classList.add("dark");
    }

    /* ✅ Toggle */
    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark");
    });

    /* ✅ Placeholder */
    editor.addEventListener("input", () => {
      if (editor.innerText.trim().length > 0) {
        placeholder.style.display = "none";
      } else {
        placeholder.style.display = "block";
      }
      resetTimer();
    });

    /* ✅ Soft wipe (button + kiosk) */
    function softClear() {
      editor.innerHTML = "";
      placeholder.style.display = "block";
      editor.focus();
    }

    /* ✅ Hard reset (inactivity + hotkey) */
    function hardReset() {
      location.href = location.href;
    }

    /* ✅ Button = SOFT wipe */
    wipeBtn.addEventListener("click", softClear);

    /* ✅ Ctrl+K = HARD reset */
    window.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.key.toLowerCase() === "k") {
        e.preventDefault();
        hardReset();
      }
    });

    /* ✅ Timer */
    function resetTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(hardReset, INACTIVITY_LIMIT);
    }

    /* ✅ Activity tracking */
    ["keydown", "mousedown", "mousemove", "touchstart"].forEach(evt => {
      window.addEventListener(evt, resetTimer);
    });

    /* ✅ Kiosk: clear on app switch */
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        softClear();
      }
    });

    /* ✅ Block drag/drop */
    window.addEventListener("drop", e => e.preventDefault());
    window.addEventListener("dragover", e => e.preventDefault());

    editor.focus();
    resetTimer();
  </script>
</body>
</html>
