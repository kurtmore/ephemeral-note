<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ephemeral Note</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      padding: 3rem;
      font-size: 2rem;
      line-height: 1.5;
      background: white;
      color: black;
      transition: background 0.2s, color 0.2s;
    }

    /* Dark mode */
    body.dark {
      background: #111;
      color: #eee;
    }

    /* Editor */
    #editor {
      min-height: 80vh;
      outline: none;
    }

    /* Placeholder overlay */
    #placeholder {
      position: absolute;
      top: 3rem;
      left: 3rem;
      opacity: 0.4;
      pointer-events: none;
    }

    /* Toggle button */
    #toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      font-size: 1rem;
      padding: 0.4rem 0.7rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      opacity: 0.7;
    }

    #toggle:hover {
      opacity: 1;
    }
  </style>
</head>

<body>
  <button id="toggle">🌙</button>

  <div id="editor" contenteditable="true" spellcheck="false"></div>
  <div id="placeholder">Start typing… (nothing is saved)</div>

  <script>
    const editor = document.getElementById("editor");
    const placeholder = document.getElementById("placeholder");
    const toggleBtn = document.getElementById("toggle");

    let inactivityTimer;
    const INACTIVITY_LIMIT = 10 * 60 * 1000; // 10 minutes

    /* ✅ SYSTEM DARK MODE DEFAULT */
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.body.classList.add("dark");
    }

    /* ✅ MANUAL TOGGLE (no persistence) */
    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark");
    });

    /* ✅ PLACEHOLDER LOGIC */
    editor.addEventListener("input", () => {
      if (editor.innerText.trim().length > 0) {
        placeholder.style.display = "none";
      } else {
        placeholder.style.display = "block";
      }
      resetTimer();
    });

    /* ✅ TIMER RESET */
    function resetTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        wipeAll();
      }, INACTIVITY_LIMIT);
    }

    /* ✅ HARD WIPE (DESTROY DOM) */
    function wipeAll() {
      document.open();
      document.write(`
        <!DOCTYPE html>
        <html>
          <head><title>Ephemeral Note</title></head>
          <body style="background:black;"></body>
        </html>
      `);
      document.close();
    }

    /* ✅ PANIC WIPE */
    window.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.key.toLowerCase() === "k") {
        e.preventDefault();
        wipeAll();
      }
    });

    /* ✅ ACTIVITY TRACKING */
    ["keydown", "mousedown", "mousemove", "touchstart"].forEach(evt => {
      window.addEventListener(evt, resetTimer);
    });

    /* ✅ WIPE ON EXIT */
    window.addEventListener("beforeunload", wipeAll);

    /* ✅ BLOCK DRAG/DROP */
    window.addEventListener("drop", e => e.preventDefault());
    window.addEventListener("dragover", e => e.preventDefault());

    /* ✅ AUTO FOCUS */
    editor.focus();

    /* ✅ START TIMER */
    resetTimer();
  </script>
</body>
</html>
