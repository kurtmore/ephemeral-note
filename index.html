<!DOCTYPE html>
<html>
<head>

  <title>Ephemeral Note</title>

      background: white;
      color: black;
      transition: background 0.2s, color 0.2s;
    }

    body.dark {
      background: #111;
      color: #eee;
    }

    #editor {
      min-height: 80vh;
      outline: none;
    }

    #placeholder {
      position: absolute;
      top: 3rem;
      left: 3rem;
      color: #999;
      pointer-events: none;
    }

    body.dark #placeholder {
      color: #bbb;
    }

    button {
      position: fixed;
      top: 1rem;
      padding: 0.6rem 1rem;
      font-size: 1.3rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      opacity: 0.75;
    }

    button:hover {
      opacity: 1;
    }

    #toggle { right: 1rem; }
    #wipe { right: 5rem; }
  </style>
</head>
